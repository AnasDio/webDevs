<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Anas Osama" />
    <meta name="publishYear" content="2025" />
    <meta name="description" content="This is a website for a taco shop" />
    <title>Little Taco Shop</title>
    <link rel="icon" href="tacoicon.png" type="icon/x-img" />
  </head>
  <body
    style="
      min-height: 100vh;
      max-width: 800px;
      margin: 0 auto;
      padding: 1rem;
      border-left: 1px solid #333;
      border-right: 1px solid #333;
    "
  >
    <header>
      <h1
        style="
          text-align: center;
          font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        "
      >
        Contact Us
      </h1>
      <nav>
        <ul>
          <li><a href="lts.html">Home</a></li>
          <li><a href="lts.html#aboutlts">AboutLTS</a></li>
          <li><a href="storehours.html#hours">Store Hours</a></li>
          <li><a href="lts.html#menu">Menu</a></li>
        </ul>
      </nav>
      <figure>
        <img src="taco3.jpeg" alt="this is a taco picture" />
        <figcaption>A tray of delicious tacos</figcaption>
      </figure>
    </header>
    <main>
      <section id="form">
        <h2>Our Contact Form</h2>
        <form action="https://httpbin.org/get" method="get">
          <fieldset>
            <legend>Send Us A Message</legend>
            <p>
              <label for="name">Name: </label>
              <input type="text" placeholder="John doe" required />
            </p>
            <p>
              <label for="email">Email: </label>
              <input type="email" placeholder="someone@example.com" required />
            </p>
            <p><label for="message">Your Message:</label></p>
            <textarea
              name="message"
              id="message"
              cols="20"
              rows="5"
              placeholder="Tell Us something nice"
            ></textarea>
          </fieldset>
          <input type="submit" />
          <input type="reset" />
        </form>
      </section>
      <section id="address">
        <h2>Our Location</h2>
        <address>
          555 Taco delicious very very, street <br />
          Egypt, Giza, Cairo, Alexandria
        </address>
        <p>
          <em>Phone: <a href="tel:+555555555">555-555-555-555</a> </em>
        </p>
        <a href="#">Back to Top</a>
        <br />
      </section>
    </main>
    <br />

    <hr />
    <footer>
      <p>Copyright &copy; The Little Taco Shop</p>
    </footer>
  </body>
</html>
